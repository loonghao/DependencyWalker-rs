name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Code formatting and linting
  format-and-lint:
    name: Format and Lint
    runs-on: windows-latest  # Use Windows for proper target support
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc,i686-pc-windows-msvc
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy (CLI features)
        run: cargo clippy --features cli --target x86_64-pc-windows-msvc -- -D warnings

      - name: Run Clippy (GUI features)
        run: cargo clippy --features gui --target x86_64-pc-windows-msvc -- -D warnings

      - name: Run Clippy (All features)
        run: cargo clippy --all-features --target x86_64-pc-windows-msvc -- -D warnings

  # Build and test (Windows only)
  build-test:
    name: Build and Test
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc, i686-pc-windows-msvc]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build --verbose --features cli --target ${{ matrix.target }}

      - name: Build GUI
        run: cargo build --verbose --features gui --target ${{ matrix.target }}

      - name: Build unified binary
        run: cargo build --verbose --features cli,gui --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --verbose --features cli,gui --target ${{ matrix.target }}

      - name: Run doc tests
        run: cargo test --doc --features cli --target ${{ matrix.target }}

  # Security audit
  security-audit:
    name: Security Audit
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit

  # GoReleaser build test (PR only)
  goreleaser-test:
    name: GoReleaser Build Test
    runs-on: windows-latest
    if: github.event_name == 'pull_request'
    needs: [format-and-lint, build-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc,i686-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          install-only: true

      - name: Test GoReleaser build
        run: goreleaser build --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: goreleaser-dist-pr
          path: dist/
          retention-days: 7

  # Check for unused dependencies
  dependency-check:
    name: Dependency Check
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked

      - name: Check for unused dependencies
        run: cargo udeps --all-targets

  # Build documentation
  docs:
    name: Documentation
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build documentation
        run: cargo doc --no-deps --all-features --target x86_64-pc-windows-msvc

  # Integration tests with real PE files
  integration-test:
    name: Integration Tests
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build test binary
        run: cargo build --bin depwalker --features cli,gui --target x86_64-pc-windows-msvc

      - name: Test with system DLLs
        run: |
          # Test with kernel32.dll
          .\target\x86_64-pc-windows-msvc\debug\depwalker.exe analyze C:\Windows\System32\kernel32.dll --format json

          # Test tree command
          .\target\x86_64-pc-windows-msvc\debug\depwalker.exe tree C:\Windows\System32\user32.dll

      - name: Test GUI mode detection
        run: |
          # Test that GUI mode is detected correctly
          Write-Host "Testing GUI mode detection..."
          # This should not crash even without display
          .\target\x86_64-pc-windows-msvc\debug\depwalker.exe --help

  # Performance benchmarks
  benchmark:
    name: Performance Benchmarks
    runs-on: windows-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run benchmarks
        run: |
          # Build optimized binary
          cargo build --release --features cli --target x86_64-pc-windows-msvc

          # Simple performance test
          Measure-Command {
            & ".\target\x86_64-pc-windows-msvc\release\depwalker.exe" analyze C:\Windows\System32\kernel32.dll
          } | Select-Object TotalMilliseconds

  # Check that test binaries compile
  test-binaries:
    name: Test Binaries
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build test binaries
        run: |
          # Build all test binaries
          cargo build --bins --features cli,gui --target x86_64-pc-windows-msvc

      - name: Test simple functionality
        run: |
          # Test basic CLI functionality
          .\target\x86_64-pc-windows-msvc\debug\depwalker.exe --version

  # All checks passed
  ci-success:
    name: CI Success
    runs-on: windows-latest
    needs: [format-and-lint, build-test, goreleaser-test, security-audit, dependency-check, docs, integration-test, benchmark, test-binaries]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          # Check if any required job failed
          if ("${{ needs.format-and-lint.result }}" -ne "success" -or
              "${{ needs.build-test.result }}" -ne "success" -or
              "${{ needs.goreleaser-test.result }}" -ne "success" -or
              "${{ needs.security-audit.result }}" -ne "success" -or
              "${{ needs.dependency-check.result }}" -ne "success" -or
              "${{ needs.docs.result }}" -ne "success" -or
              "${{ needs.integration-test.result }}" -ne "success" -or
              "${{ needs.benchmark.result }}" -ne "success" -or
              "${{ needs.test-binaries.result }}" -ne "success") {
            Write-Host "❌ One or more CI jobs failed"
            exit 1
          }
          Write-Host "✅ All CI jobs passed successfully!"
