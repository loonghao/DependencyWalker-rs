name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Code formatting and linting
  format-and-lint:
    name: Format and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Build tests on multiple platforms
  build-test:
    name: Build and Test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, beta]
        exclude:
          # Only test GUI features on Windows
          - os: ubuntu-latest
            rust: beta
          - os: macos-latest
            rust: beta
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Install system dependencies for Linux
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      # Build CLI version (all platforms)
      - name: Build CLI
        run: cargo build --verbose --features cli

      # Build GUI version (Windows only)
      - name: Build GUI (Windows)
        if: runner.os == 'Windows'
        run: cargo build --verbose --features gui

      # Build unified binary (Windows only)
      - name: Build Unified Binary (Windows)
        if: runner.os == 'Windows'
        run: cargo build --verbose --features cli,gui

      # Run tests
      - name: Run tests
        run: cargo test --verbose --features cli

      - name: Run GUI tests (Windows)
        if: runner.os == 'Windows'
        run: cargo test --verbose --features gui

      # Run doc tests
      - name: Run doc tests
        run: cargo test --doc --features cli

  # Security audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit

  # GoReleaser build test (PR only)
  goreleaser-test:
    name: GoReleaser Build Test
    runs-on: windows-latest
    if: github.event_name == 'pull_request'
    needs: [format-and-lint, build-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc,i686-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          install-only: true

      - name: Test GoReleaser build
        run: goreleaser build --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: goreleaser-dist-pr
          path: dist/
          retention-days: 7

  # Check for unused dependencies
  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked

      - name: Check for unused dependencies
        run: cargo +nightly udeps --all-targets

  # Build documentation
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build documentation
        run: cargo doc --no-deps --all-features

      - name: Check for broken links in docs
        run: cargo doc --no-deps --all-features 2>&1 | grep -i "warning\|error" && exit 1 || exit 0

  # Integration tests with real PE files
  integration-test:
    name: Integration Tests
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build test binary
        run: cargo build --bin depwalker --features cli,gui

      - name: Test with system DLLs
        run: |
          # Test with kernel32.dll
          ./target/debug/depwalker.exe analyze C:\Windows\System32\kernel32.dll --format json
          
          # Test tree command
          ./target/debug/depwalker.exe tree C:\Windows\System32\user32.dll

      - name: Test GUI mode detection
        run: |
          # Test that GUI mode is detected correctly
          echo "Testing GUI mode detection..."
          # This should not crash even without display
          timeout 10 ./target/debug/depwalker.exe --help || true

  # Performance benchmarks
  benchmark:
    name: Performance Benchmarks
    runs-on: windows-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run benchmarks
        run: |
          # Build optimized binary
          cargo build --release --features cli
          
          # Simple performance test
          Measure-Command { 
            ./target/release/depwalker.exe analyze C:\Windows\System32\kernel32.dll 
          } | Select-Object TotalMilliseconds

  # Check that examples compile
  examples:
    name: Examples
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build examples
        run: |
          # Build all example binaries
          cargo build --examples --features cli,gui

      - name: Test examples
        run: |
          # Test simple examples that don't require GUI
          cargo run --example test_pe_parser --features cli

  # All checks passed
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [format-and-lint, build-test, goreleaser-test, security-audit, dependency-check, docs, integration-test, benchmark, examples]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          # Check if any required job failed
          if [[ "${{ needs.format-and-lint.result }}" != "success" ||
                "${{ needs.build-test.result }}" != "success" ||
                "${{ needs.goreleaser-test.result }}" != "success" ||
                "${{ needs.security-audit.result }}" != "success" ||
                "${{ needs.dependency-check.result }}" != "success" ||
                "${{ needs.docs.result }}" != "success" ||
                "${{ needs.integration-test.result }}" != "success" ]]; then
            echo "❌ One or more CI jobs failed"
            exit 1
          fi
          echo "✅ All CI jobs passed successfully!"
