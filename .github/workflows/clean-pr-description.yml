name: Clean PR Description

on:
  pull_request:
    types: [opened, edited, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  clean-description:
    name: Remove Augment Code References
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Clean PR Description
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const currentBody = context.payload.pull_request.body || '';
            
            // Patterns to detect and remove Augment Code references
            const augmentPatterns = [
              /Pull Request opened by Augment Code with guidance from the PR author/gi,
              /This PR was created by Augment Code/gi,
              /Generated by Augment Code/gi,
              /Augment Code assisted in creating this PR/gi,
              /With assistance from Augment Code/gi,
              /Created with Augment Code/gi,
              /Augment Code helped generate/gi,
              /\*\*Note:\*\*.*Augment Code.*$/gim,
              /---\s*\*\*Augment Code.*$/gim,
              /\n\s*\*Augment Code.*$/gim
            ];
            
            let cleanedBody = currentBody;
            let hasChanges = false;
            
            // Remove Augment Code references
            for (const pattern of augmentPatterns) {
              const beforeLength = cleanedBody.length;
              cleanedBody = cleanedBody.replace(pattern, '');
              if (cleanedBody.length !== beforeLength) {
                hasChanges = true;
                console.log(`Removed pattern: ${pattern}`);
              }
            }
            
            // Clean up extra whitespace and newlines
            if (hasChanges) {
              cleanedBody = cleanedBody
                .replace(/\n{3,}/g, '\n\n')  // Replace multiple newlines with double newlines
                .replace(/\s+$/gm, '')       // Remove trailing whitespace
                .trim();                     // Remove leading/trailing whitespace
              
              // Update the PR description
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: prNumber,
                body: cleanedBody
              });
              
              console.log('✅ PR description cleaned successfully');
              
              // Add a comment to notify about the cleanup
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: `🧹 **Automated Cleanup**
                
                Removed Augment Code references from the PR description to maintain clean documentation.
                
                This is an automated action to ensure consistent PR formatting.`
              });
            } else {
              console.log('✅ No Augment Code references found in PR description');
            }
